{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Message sent" %} — {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="text-center max-w-md">
    <div class="text-success text-6xl mb-6">✓</div>
    <h1 class="text-3xl font-bold mb-4">{% trans "Message sent!" %}</h1>
    <p class="text-base-content/70 mb-8">{% trans "Thank you for reaching out. We'll get back to you as soon as possible." %}</p>
    <a href="{% url 'pages:home' %}" class="btn btn-primary">{% trans "Back to home" %}</a>
  </div>
</div>
{% endblock %}
