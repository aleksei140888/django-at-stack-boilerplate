{% load i18n %}
{% load static %}
<div
  x-data="cookieConsent()"
  x-show="!accepted"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0 translate-y-4"
  x-transition:enter-end="opacity-100 translate-y-0"
  class="fixed bottom-0 left-0 right-0 z-50 p-4 bg-base-200 shadow-2xl border-t border-base-300"
  role="dialog"
  aria-label="{% trans 'Cookie consent' %}"
  aria-modal="false"
>
  <div class="container mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
    <p class="text-sm text-base-content">
      {% blocktrans trimmed %}
        We use cookies to improve your experience. By continuing to use our site, you accept our
        <a href="/cookies/" class="link link-primary">Cookie Policy</a> and
        <a href="/privacy/" class="link link-primary">Privacy Policy</a>.
      {% endblocktrans %}
    </p>
    <div class="flex gap-2 shrink-0">
      <button @click="accept()" class="btn btn-primary btn-sm">{% trans "Accept" %}</button>
      <a href="{% url 'pages:cookies' %}" class="btn btn-ghost btn-sm">{% trans "Learn more" %}</a>
    </div>
  </div>
</div>
